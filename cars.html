<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
</head>
<body data-page="cars">
  <div id="loadingOverlay" class="loading-overlay hidden" aria-live="assertive" aria-label="Laster">
    <div class="loading-box">
      <div class="spinner"></div>
      <p id="loadingText">Laster...</p>
    </div>
  </div>

  <main class="container">
    <div class="card">
      <div class="user-bar">
        <h2>Biler</h2>
        <div class="user-bar-actions">
          <p id="userInfo" aria-label="Innlogget bruker"></p>
          <button id="logoutBtn" type="button">Logg ut</button>
        </div>
      </div>

      <nav class="top-nav" aria-label="Hovednavigasjon">
        <a href="./app.html" class="top-nav__link">Dashboard</a>
        <a href="./movies.html" class="top-nav__link">Filmer</a>
        <a href="./tvshows.html" class="top-nav__link">TV-serier</a>
        <a href="./cars.html" class="top-nav__link is-active" aria-current="page">Biler</a>
        <a href="./books.html" class="top-nav__link">Bøker</a>
      </nav>

      <section class="subsection" id="carsSection" aria-label="Biler">
        <div class="section-header">
          <h3>Biler</h3>
        </div>

        <div class="car-builder">
          <div class="add-row add-row--cars-top">
            <input type="number" id="carYear" placeholder="Årsmodell (f.eks. 2020)" min="1996" max="2099" />
            <input type="text" id="carBrand" placeholder="Bilmerke (f.eks. Volkswagen)" autocomplete="off" />
            <button id="fetchCarModelsBtn" type="button">Hent modeller</button>
          </div>

          <div class="add-row add-row--cars-bottom">
            <select id="carModelSelect" aria-label="Velg bilmodell">
              <option value="">Velg modell fra liste...</option>
            </select>
            <button id="addCarBtn" type="button">Legg til</button>
          </div>

          <div class="manual-model-wrapper">
            <label for="carModelManual">Fant du ikke modellen? Skriv den inn manuelt:</label>
            <input type="text" id="carModelManual" placeholder="F.eks. Scirocco" autocomplete="off" />
          </div>
        </div>

        <div class="search-wrapper">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="5.5"/>
            <line x1="13" y1="13" x2="18" y2="18"/>
          </svg>
          <input type="search" id="carSearch" placeholder="Søk på år, merke eller modell..." />
        </div>

        <div class="sort-row">
          <select id="carSort" aria-label="Sorter biler">
            <option value="year-desc">Årsmodell: nyeste først</option>
            <option value="year-asc">Årsmodell: eldste først</option>
            <option value="brand-asc">Merke: A–Å</option>
            <option value="brand-desc">Merke: Å–A</option>
            <option value="model-asc">Modell: A–Å</option>
            <option value="model-desc">Modell: Å–A</option>
          </select>
        </div>

        <ul id="carList" aria-label="Billiste"></ul>
      </section>
    </div>

    <p id="message" aria-live="polite"></p>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
