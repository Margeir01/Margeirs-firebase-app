<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logg inn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <style>
    .login-logo {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 12px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-logo svg {
      width: 22px;
      height: 22px;
      color: #fff;
    }
    .login-tagline {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 28px;
      margin-top: -20px;
    }
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    .field-group {
      margin-bottom: 12px;
    }
    .field-group input {
      margin-bottom: 0;
    }
  </style>
</head>
<body class="center-page">
  <main class="container container--narrow">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
    </div>

    <h1>Tracker</h1>
    <p class="login-tagline">Hold oversikt over alt du ser, leser og eier.</p>

    <section class="card">
      <h2>Opprett konto</h2>

      <div class="field-group">
        <label class="field-label" for="registerEmail">E-post</label>
        <input type="email" id="registerEmail" placeholder="din@epost.no" autocomplete="email" />
      </div>
      <div class="field-group">
        <label class="field-label" for="registerPassword">Passord</label>
        <input type="password" id="registerPassword" placeholder="Minst 6 tegn" autocomplete="new-password" />
      </div>
      <button id="registerBtn">Opprett konto</button>

      <button id="googleLoginBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Fortsett med Google
      </button>

      <div class="divider"><span>eller logg inn</span></div>

      <div class="field-group">
        <label class="field-label" for="loginEmail">E-post</label>
        <input type="email" id="loginEmail" placeholder="din@epost.no" autocomplete="email" />
      </div>
      <div class="field-group">
        <label class="field-label" for="loginPassword">Passord</label>
        <input type="password" id="loginPassword" placeholder="Passord" autocomplete="current-password" />
      </div>
      <button id="loginBtn">Logg inn</button>
    </section>

    <p id="message" aria-live="polite"></p>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
