<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
</head>
<body data-page="movies">
  <div id="loadingOverlay" class="loading-overlay hidden" aria-live="assertive" aria-label="Laster">
    <div class="loading-box">
      <div class="spinner"></div>
      <p id="loadingText">Laster...</p>
    </div>
  </div>

  <main class="container">
    <div class="card">
      <div class="user-bar">
        <h2>Filmer</h2>
        <div class="user-bar-actions">
          <p id="userInfo" aria-label="Innlogget bruker"></p>
          <button id="logoutBtn" type="button">Logg ut</button>
        </div>
      </div>

      <nav class="top-nav" aria-label="Hovednavigasjon">
        <a href="./app.html" class="top-nav__link">Dashboard</a>
        <a href="./movies.html" class="top-nav__link is-active" aria-current="page">Filmer</a>
        <a href="./tvshows.html" class="top-nav__link">TV-serier</a>
        <a href="./cars.html" class="top-nav__link">Biler</a>
        <a href="./books.html" class="top-nav__link">Bøker</a>
      </nav>

      <section class="subsection" id="moviesSection" aria-label="Filmer">
        <div class="section-header">
          <h3>Filmer</h3>
        </div>

        <div class="add-row add-row--movie">
          <input type="text" id="movieTitle" placeholder="Filmtittel" autocomplete="off" />
          <button id="addMovieBtn" type="button">Legg til</button>
        </div>

        <div class="search-wrapper">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="5.5"/>
            <line x1="13" y1="13" x2="18" y2="18"/>
          </svg>
          <input type="search" id="movieSearch" placeholder="Søk på tittel, sjanger, status..." />
        </div>

        <div class="sort-row">
          <select id="movieSort" aria-label="Sorter filmer">
            <option value="added-desc">Lagt til: nyeste først</option>
            <option value="added-asc">Lagt til: eldste først</option>
            <option value="release-desc">Utgivelse: nyeste først</option>
            <option value="release-asc">Utgivelse: eldste først</option>
            <option value="runtime-desc">Runtime: lengst først</option>
            <option value="runtime-asc">Runtime: kortest først</option>
            <option value="progress-desc">Fremgang: høyest først</option>
            <option value="progress-asc">Fremgang: lavest først</option>
            <option value="manual-asc">Manuell rekkefølge</option>
            <option value="title-asc">Tittel: A–Å</option>
            <option value="title-desc">Tittel: Å–A</option>
          </select>
        </div>

        <ul id="movieList" aria-label="Filmliste"></ul>
      </section>
    </div>

    <p id="message" aria-live="polite"></p>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
